services:
  - type: web
    name: coach-roostoo
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: API_KEY
        sync: false   # paste your model API key in the Render dashboard
      - key: COACH_SERVICE_SECRET
        sync: false   # must match COACH_SERVICE_SECRET in roostoo-power-api
